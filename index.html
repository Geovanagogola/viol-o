<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard - Violão</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="flashcard">
        <div class="card">
            <div class="front">
                <h2>❓ Verdadeiro ou Falso?</h2>
                <p>O violão tem <strong>8 cordas.</strong></p>
            </div>

            <div class="back">
                <h2>✅ Resposta</h2>
                <p>Falso! O violão tradicional tem <strong>6 cordas.</strong></p>
            </div>
        </div>
    </div>

</body>
</html>
